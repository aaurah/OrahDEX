    <!-- Structured Data — Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Orah",
      "alternateName": "OrahDEX DEX",
      "url": "https://orah.org",
      "logo": "https://orah.org/opengraph.jpg",
      "description": "Orah is a multi-chain decentralized exchange offering spot trading, perpetual futures, P2P markets, and on-chain BSV settlement. 900+ markets, EVM · TRON · BSV wallets.",
      "sameAs": ["https://twitter.com/Orah"]
    }
    </script>

    <!-- Structured Data — WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Orah",
      "url": "https://orah.org",
      "description": "Trade means DEX — Multi-chain crypto exchange with 900+ markets, Genesis Liquidity Engine, EVM · TRON · BSV",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://orah.org/trade/{search_term_string}-USDT"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data — FinancialService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialService",
      "name": "Orah",
      "url": "https://orah.org",
      "description": "Decentralized cryptocurrency exchange with spot trading, perpetual futures, P2P, and AMM liquidity pools. On-chain settlement via Bitcoin SV.",
      "serviceType": "Cryptocurrency Exchange",
      "areaServed": "Worldwide",
      "currenciesAccepted": "BTC, ETH, BSV, BCH, USDT, USDC, BNB, SOL",
      "offers": {
        "@type": "Offer",
        "description": "Zero-fee spot trading, up to 100x leverage futures, P2P fiat ramps, AMM liquidity pools"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
