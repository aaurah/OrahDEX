kind = "web"
  previewPath = "/"
  title = "OrahDEX"
  version = "1.0.0"
  id = "artifacts/bsv-dex"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 20180

  [services.development]
  run = "pnpm --filter @workspace/bsv-dex run dev"

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/bsv-dex", "run", "build"]

  [services.production.run]
  args = ["node", "artifacts/bsv-dex/server.mjs"]

  [services.production.run.env]
  PORT = "20180"
  NODE_ENV = "production"

  [services.env]
  PORT = "20180"
  BASE_PATH = "/"
