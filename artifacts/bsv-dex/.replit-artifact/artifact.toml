kind = "web"
  previewPath = "/"
  title = "OrahDEX"
  version = "1.0.0"
  id = "artifacts/bsv-dex"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 20180

  [services.development]
  run = "pnpm --filter @workspace/bsv-dex run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/bsv-dex", "run", "build" ]
  publicDir = "artifacts/bsv-dex/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/assets/*"
  to = "/assets/:splat"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "20180"
  BASE_PATH = "/"
